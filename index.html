<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 关键视口设置，禁止缩放，体验更像App -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>拼图工具(多图连发版)</title>
    <style>
        /* 全局盒模型修复 */
        * { box-sizing: border-box; }

        body { 
            margin: 0; padding: 10px; 
            padding-bottom: constant(safe-area-inset-bottom);
            padding-bottom: env(safe-area-inset-bottom); 
            background: #f2f4f8; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        
        .box { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        
        .row { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
        .control-group { flex: 1; display: flex; gap: 5px; align-items: center; min-width: 120px;}
        
        /* 表单控件优化 */
        select, input[type="number"], input[type="text"] { 
            padding: 0 10px; border: 1px solid #e0e0e0; border-radius: 8px; flex: 1; height: 42px;
            font-size: 16px; background: #fafafa; -webkit-appearance: none; width: 100%;
        }
        
        input[type="color"] { 
            height: 42px; width: 50px; border: none; padding: 0; 
            border-radius: 6px; background: none; flex: none;
        }

        label { font-size: 13px; color: #555; font-weight: 500; white-space: nowrap; }

        /* 按钮系统 */
        .btn { 
            display: flex; justify-content: center; align-items: center;
            width: 100%; height: 48px; border: none; border-radius: 10px; 
            background: #007aff; color: white; font-size: 17px; font-weight: 600; 
            cursor: pointer; box-shadow: 0 3px 6px rgba(0,122,255,0.2);
            transition: opacity 0.2s;
            text-decoration: none;
        }
        .btn:active { opacity: 0.8; }
        .btn.green { background: #34c759; box-shadow: 0 3px 6px rgba(52,199,89,0.2); margin-top: 10px;}
        .btn.red { background: #ff3b30; box-shadow: 0 3px 6px rgba(255,59,48,0.2); margin-top: 15px; }
        
        .hide { display: none !important; }
        
        /* 预览区优化 */
        #preview { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 15px; 
            max-height: 200px; overflow-y: auto; border: 1px dashed #ccc; padding: 5px; border-radius: 8px;
        }
        .thumb { aspect-ratio: 1; background: #eee; border-radius: 6px; overflow: hidden; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        
        /* 结果区域 */
        .result-item { border-top: 2px solid #eee; margin-top: 20px; padding-top: 15px; }
        .result-title { font-weight: bold; color: #333; margin-bottom: 10px; text-align: center;}
        canvas { max-width: 100%; height: auto; border: 1px solid #eee; display: block; margin: 10px auto; background: #fff; }
        
        #msg { color: #666; font-size: 13px; text-align: center; margin: 10px 0; background: #eef2f6; padding: 8px; border-radius: 6px;}
        .watermark { text-align: center; color: #ccc; font-size: 12px; margin: 30px 0; }
        
        .loading-mask {
            position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.5); 
            display: flex; justify-content: center; align-items: center; color: white; z-index: 999;
            flex-direction: column;
        }
    </style>
</head>
<body>

<div id="loading" class="loading-mask hide">
    <div style="font-size: 30px; margin-bottom: 10px;">⏳</div>
    <div id="loadingText">处理中...</div>
</div>

<div class="box">
    <div class="row">
        <div class="control-group">
            <label>布局</label>
            <select id="layout">
                <option value="4" selected>4×4 (16张)</option>
                <option value="3">3×3 (9张)</option>
                <option value="5">5×5 (25张)</option>
                <option value="custom">自定义行列</option>
            </select>
        </div>
        <div class="control-group">
            <label>比例</label>
            <select id="ratio">
                <option value="1">正方 1:1</option>
                <option value="0.75">竖向 3:4</option>
                <option value="0.5625">全屏 9:16</option>
            </select>
        </div>
    </div>

    <div class="row hide" id="customBox">
        <div class="control-group"><label>行数</label><input type="number" id="rows" value="4" inputmode="numeric"></div>
        <div class="control-group"><label>列数</label><input type="number" id="cols" value="4" inputmode="numeric"></div>
    </div>

    <!-- 首号与字号 -->
    <div class="row">
        <div class="control-group"><label>首号</label><input type="number" id="startNo" value="1" inputmode="numeric"></div>
        <div class="control-group"><label>字号</label><input type="number" id="fontSize" value="120" inputmode="numeric"></div>
    </div>
    
    <!-- 生成张数与颜色（排在首号下方） -->
    <div class="row">
        <div class="control-group">
            <label>生成张数</label>
            <input type="number" id="outCount" value="1" min="1" inputmode="numeric">
        </div>
        <div class="control-group" style="flex: 0 auto;"><label>颜色</label><input type="color" id="fontColor" value="#000000"></div>
    </div>

    <input type="file" id="file" multiple accept="image/*" style="position: absolute; opacity: 0; width: 1px; height: 1px; overflow: hidden; z-index: -1;">
    <label for="file" class="btn">➕ 添加图片 (<span id="count">0</span>)</label>
    
    <div id="preview" class="hide"></div>
</div>

<div class="box">
    <div id="msg">请先添加图片</div>

    <button class="btn" onclick="generateAll()">✨ 开始生成拼图</button>
    
    <div id="resultsContainer"></div>
    
    <button class="btn red" onclick="location.reload()">🗑️ 清空重置</button>
</div>

<div class="watermark">玉灵溪祝各位老师用的愉快</div>

<script>
    let images = []; 
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    
    // UI 元素
    const layoutSel = document.getElementById('layout');
    const outCountInput = document.getElementById('outCount');
    const msgBox = document.getElementById('msg');

    layoutSel.onchange = function() {
        const isCustom = this.value === 'custom';
        document.getElementById('customBox').classList.toggle('hide', !isCustom);
        if(!isCustom) {
            document.getElementById('rows').value = this.value;
            document.getElementById('cols').value = this.value;
        }
        updateInfo();
    };

    document.getElementById('rows').oninput = updateInfo;
    document.getElementById('cols').oninput = updateInfo;

    function updateInfo() {
        if(images.length === 0) return;
        const r = parseInt(document.getElementById('rows').value) || 1;
        const c = parseInt(document.getElementById('cols').value) || 1;
        const perPage = r * c;
        const maxPages = Math.ceil(images.length / perPage);
        msgBox.innerText = `已选 ${images.length} 张图，每页可容纳 ${perPage} 张，最多可出 ${maxPages} 张拼图。`;
        if(parseInt(outCountInput.value) > maxPages) outCountInput.value = maxPages;
    }

    const showLoading = (text) => {
        document.getElementById('loadingText').innerText = text;
        document.getElementById('loading').classList.remove('hide');
    };
    const hideLoading = () => document.getElementById('loading').classList.add('hide');

    // 图片处理
    async function processFiles(files) {
        if(files.length === 0) return;
        showLoading(`加载图片中...`);
        document.getElementById('preview').classList.remove('hide');

        for (let file of files) {
            try {
                const img = await loadImageAndCompress(file);
                images.push(img);
                const div = document.createElement('div');
                div.className = 'thumb';
                div.innerHTML = `<img src="${img.src}">`;
                document.getElementById('preview').appendChild(div);
                document.getElementById('count').innerText = images.length;
            } catch (err) { console.error(err); }
        }
        updateInfo();
        hideLoading();
    }

    function loadImageAndCompress(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const maxDim = 1200; 
                    let w = img.width, h = img.height;
                    if (w > maxDim || h > maxDim) {
                        const scale = maxDim / Math.max(w, h);
                        w *= scale; h *= scale;
                    }
                    const cvs = document.createElement('canvas');
                    cvs.width = w; cvs.height = h;
                    cvs.getContext('2d').drawImage(img, 0, 0, w, h);
                    const newImg = new Image();
                    newImg.onload = () => resolve(newImg);
                    newImg.src = cvs.toDataURL('image/jpeg', 0.8);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    document.getElementById('file').onchange = function(e) {
        processFiles(Array.from(e.target.files));
        this.value = '';
    };

    // 批量生成核心
    async function generateAll() {
        if (!images.length) return alert('请先添加图片');
        
        const r = parseInt(document.getElementById('rows').value) || 4;
        const c = parseInt(document.getElementById('cols').value) || 4;
        const numToGen = parseInt(outCountInput.value) || 1;
        const perPage = r * c;

        const container = document.getElementById('resultsContainer');
        container.innerHTML = ''; // 清空旧的
        
        showLoading(`正在生成 ${numToGen} 张拼图...`);

        // 异步循环生成，防止UI死掉
        for(let i = 0; i < numToGen; i++) {
            const startIdx = i * perPage;
            const endIdx = Math.min(startIdx + perPage, images.length);
            const batch = images.slice(startIdx, endIdx);
            
            if(batch.length === 0) break;

            const canvas = await drawSingleGrid(batch, r, c, i + 1);
            
            // 创建结果 UI
            const wrapper = document.createElement('div');
            wrapper.className = 'result-item';
            wrapper.innerHTML = `<div class="result-title">第 ${i+1} 张 (包含图片 ${startIdx+1} - ${endIdx})</div>`;
            wrapper.appendChild(canvas);
            
            const dlBtn = document.createElement('button');
            dlBtn.className = 'btn green';
            dlBtn.innerText = `💾 保存第 ${i+1} 张`;
            dlBtn.onclick = () => downloadCanvas(canvas, i + 1);
            wrapper.appendChild(dlBtn);
            
            container.appendChild(wrapper);
        }

        hideLoading();
        window.scrollTo({ top: container.offsetTop, behavior: 'smooth' });
    }

    // 绘制单张拼图
    function drawSingleGrid(batch, r, c, pageNum) {
        return new Promise((resolve) => {
            setTimeout(() => {
                const ratio = parseFloat(document.getElementById('ratio').value);
                const userFontSize = parseInt(document.getElementById('fontSize').value) || 120;
                const userFontColor = document.getElementById('fontColor').value;
                const startNoBase = parseInt(document.getElementById('startNo').value) || 1;

                let cellW = isIOS ? 800 : 1000;
                if (r * c > 40) cellW = 600;
                const cellH = cellW / ratio;
                
                let totalW = c * cellW;
                let totalH = r * cellH;

                const maxPixels = isIOS ? 16000000 : 40000000;
                if (totalW * totalH > maxPixels) {
                    const scale = Math.sqrt(maxPixels / (totalW * totalH));
                    totalW *= scale; totalH *= scale; cellW *= scale;
                }

                const canvas = document.createElement('canvas');
                canvas.width = totalW;
                canvas.height = totalH;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                batch.forEach((img, i) => {
                    const col = i % c;
                    const row = Math.floor(i / c);
                    const x = col * cellW;
                    const y = row * (cellW / ratio);
                    const h = cellW / ratio;

                    // Cover 绘制
                    const imgR = img.width / img.height;
                    let dw = cellW, dh = h, dx = 0, dy = 0;
                    if (imgR > ratio) {
                        dw = dh * imgR; dx = (cellW - dw) / 2;
                    } else {
                        dh = dw / imgR; dy = (h - dh) / 2;
                    }

                    ctx.save();
                    ctx.beginPath();
                    ctx.rect(x, y, cellW, h);
                    ctx.clip();
                    ctx.drawImage(img, x + dx, y + dy, dw, dh);
                    ctx.restore();

                    // 文字
                    const fontSize = cellW * (userFontSize / 1000);
                    ctx.font = `bold ${fontSize}px -apple-system, sans-serif`; 
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'bottom';
                    const tx = x + cellW / 2;
                    const ty = y + h - (cellW * 0.02);
                    
                    // 序号计算：起始号 + 之前已出图的总数 + 当前页索引
                    const currentNum = startNoBase + ((pageNum - 1) * (r * c)) + i;

                    ctx.lineWidth = fontSize / 10; 
                    ctx.strokeStyle = 'white';
                    ctx.lineJoin = 'round';
                    ctx.strokeText(currentNum, tx, ty);
                    ctx.fillStyle = userFontColor;
                    ctx.fillText(currentNum, tx, ty);
                });
                resolve(canvas);
            }, 50);
        });
    }

    function downloadCanvas(canvas, index) {
        showLoading("正在压缩...");
        setTimeout(() => {
            let quality = 0.92;
            let dataURL = canvas.toDataURL('image/jpeg', quality);
            const checkSize = (str) => (str.length * 0.75) / 1024 / 1024;

            while (checkSize(dataURL) > 29.5 && quality > 0.1) {
                quality -= 0.1;
                dataURL = canvas.toDataURL('image/jpeg', quality);
            }

            if (isIOS) {
                const win = window.open();
                if(win){
                    win.document.write('<title>长按保存</title><h2 style="text-align:center;font-family:sans-serif;margin-top:20px;">长按下方图片保存</h2><img src="' + dataURL + '" style="width:100%;"/>');
                } else {
                    location.href = dataURL;
                }
            } else {
                const link = document.createElement('a');
                link.download = `拼图_${index}_${Date.now()}.jpg`;
                link.href = dataURL;
                link.click();
            }
            hideLoading();
        }, 100);
    }
</script>
</body>
</html>
